<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>injunweb</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

    :root {
      --primary: #1e90ff;
      --gradient: linear-gradient(135deg, #1e90ff, #ff007f);
      --dark: #0a0a0a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--dark);
      color: white;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background-color: #000;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      color: white;
      border-bottom: 1px solid #333;
      z-index: 1000;
    }

    .logo-link {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: white;
    }

    .logo-img {
      height: 40px;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    .logo-title {
      font-size: 24px;
      margin: 0;
      color: white;
      text-decoration: none;
    }

    main {
      flex: 1;
      padding-top: 60px;
    }

    .hero {
      min-height: calc(100vh - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: radial-gradient(circle at center, rgba(30, 144, 255, 0.1) 0%, transparent 70%);
      position: relative;
      overflow: hidden;
    }

    .hero-content {
      max-width: 800px;
      z-index: 1;
    }

    .hero h2 {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: slideUp 1s ease-out;
    }

    .hero p {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      animation: slideUp 1s ease-out 0.3s backwards;
    }

    .cta-button {
      display: inline-block;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      background: var(--gradient);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      transition: transform 0.3s, box-shadow 0.3s;
      animation: slideUp 1s ease-out 0.6s backwards;
    }

    .cta-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(30, 144, 255, 0.3);
    }

    .floating-elements {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .floating-element {
      position: absolute;
      background: var(--gradient);
      border-radius: 50%;
      opacity: 0.1;
      animation: float 20s infinite;
    }

    footer {
      background-color: #000;
      padding: 5px 0;
      text-align: center;
      color: white;
      border-top: 1px solid #333;
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0);
      }

      25% {
        transform: translate(100px, 100px);
      }

      50% {
        transform: translate(0, 200px);
      }

      75% {
        transform: translate(-100px, 100px);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .hero h2 {
        font-size: 2.5rem;
      }

      .hero p {
        font-size: 1.2rem;
      }
    }

    @media (max-width: 600px) {
      header {
        padding: 10px 10px;
      }
    }
  </style>
</head>

<body>
  <header>
    <a href="#" class="logo-link">
      <img src="logo.svg" alt="injunweb Logo" class="logo-img">
      <h1 class="logo-title">injunweb</h1>
    </a>
  </header>

  <main>
    <section class="hero">
      <div class="floating-elements">
        <div class="floating-element" style="width: 300px; height: 300px; top: 10%; left: 10%;"></div>
        <div class="floating-element" style="width: 200px; height: 200px; top: 60%; left: 70%;"></div>
        <div class="floating-element" style="width: 150px; height: 150px; top: 30%; left: 80%;"></div>
      </div>
      <div class="hero-content">
        <h2>안녕하세요,<br>개발자 injun입니다</h2>
        <p>웹 개발과 새로운 기술에 대한 열정을 가지고 있습니다</p>
        <a href="https://github.com/injunweb" class="cta-button">GitHub 방문하기</a>
      </div>
    </section>
  </main>

  <footer>
    &copy; 2024 injunweb. All rights reserved.
  </footer>
</body>

</html>
