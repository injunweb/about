<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INJUN CLOUD</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #000000;
      --white: #ffffff;
      --gray: #666666;
      --light-gray: #f5f5f5;
      --border: #e0e0e0;
    }

    body {
      font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
      background: var(--white);
      color: var(--black);
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      display: none;
    }

    html {
      -ms-overflow-style: none;
      scrollbar-width: none;
      scroll-behavior: smooth;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      display: flex;
      align-items: center;
      padding: 0 4rem;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--black);
      text-decoration: none;
    }

    .floating-social {
      position: fixed;
      left: 2rem;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      z-index: 100;
      animation: fadeIn 1s ease 1s forwards;
      opacity: 0;
    }

    .floating-social::after {
      content: '';
      width: 1px;
      height: 90px;
      background: var(--border);
    }

    .floating-social a {
      color: var(--gray);
      font-size: 1.2rem;
      transition: all 0.3s;
    }

    .floating-social a:hover {
      color: var(--black);
      transform: translateY(-3px);
    }

    .floating-email {
      position: fixed;
      right: 2rem;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      z-index: 100;
      animation: fadeIn 1s ease 1s forwards;
      opacity: 0;
    }

    .floating-email::after {
      content: '';
      width: 1px;
      height: 90px;
      background: var(--border);
    }

    .floating-email a {
      writing-mode: vertical-rl;
      color: var(--gray);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      transition: all 0.3s;
    }

    .floating-email a:hover {
      color: var(--black);
      transform: translateY(-3px);
    }

    .main-content {
      max-width: 1000px;
      margin: 0 auto;
      padding: 70px 2rem 0;
    }

    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 90px;
      padding-bottom: 100px;
    }

    .hero-logo {
      width: 96px;
      height: 96px;
      margin-bottom: 2.5rem;
      animation: fadeInUp 0.6s ease forwards;
    }

    .hero-greeting {
      font-size: 1.1rem;
      color: var(--gray);
      margin-top: 1.25rem;
      margin-bottom: 2.5rem;
      animation: fadeInUp 0.6s ease 0.4s forwards;
      opacity: 0;
    }

    .hero-title {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.6s ease 0.2s forwards;
      opacity: 0;
    }

    .hero-subtitle {
      font-size: 2rem;
      color: var(--gray);
      margin-bottom: 2rem;
      animation: fadeInUp 0.6s ease 0.4s forwards;
      opacity: 0;
    }

    .hero-description {
      max-width: 600px;
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--gray);
      margin-bottom: 3rem;
      animation: fadeInUp 0.6s ease 0.6s forwards;
      opacity: 0;
    }

    .hero-cta {
      display: inline-block;
      padding: 1rem 2rem;
      border: 1px solid var(--black);
      color: var(--black);
      text-decoration: none;
      font-size: 1rem;
      transition: all 0.3s;
      animation: fadeInUp 0.6s ease 0.8s forwards;
      opacity: 0;
    }

    .hero-cta:hover {
      background: var(--black);
      color: var(--white);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .header {
        padding: 0 1rem;
      }

      .logo {
        font-size: 1rem;
      }

      .main-content {
        padding: 70px 1.5rem 0;
      }

      #hero {
        padding-top: 120px;
        padding-bottom: 80px;
        min-height: 100vh;
      }

      .hero-title {
        font-size: 2.5rem;
      }

      .hero-subtitle {
        font-size: 1.5rem;
      }

      .floating-social,
      .floating-email {
        display: none;
      }
    }
  </style>
</head>

<body>
  <header class="header">
    <a href="#hero" class="logo">INJUN CLOUD</a>
  </header>

  <div class="floating-social">
    <a href="https://github.com/injun-cloud" target="_blank" aria-label="GitHub">
      <i class="ri-github-fill"></i>
    </a>
    <a href="https://blog.injun.dev" target="_blank" aria-label="Blog">
      <i class="ri-article-line"></i>
    </a>
  </div>

  <div class="floating-email">
    <a href="mailto:me@injun.dev">me@injun.dev</a>
  </div>

  <main class="main-content">
    <section id="hero">
      <svg class="hero-logo" viewBox="0 0 400 400" fill="#000000" role="img" aria-label="INJUN CLOUD logo">
        <rect x="81" y="73" width="19" height="254"/>
        <rect x="81" y="73" width="34" height="19"/>
        <rect x="81" y="308" width="34" height="19"/>
        <rect x="300" y="73" width="19" height="254"/>
        <rect x="285" y="73" width="34" height="19"/>
        <rect x="285" y="308" width="34" height="19"/>
        <circle cx="200" cy="200" r="27"/>
      </svg>
      <h1 class="hero-title">INJUN CLOUD</h1>
      <p class="hero-greeting">Do you like homelab?</p>
      <a href="https://github.com/injun-cloud" target="_blank" class="hero-cta">GitHub 방문하기</a>
    </section>
  </main>
</body>

</html>
